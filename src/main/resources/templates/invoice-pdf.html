<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; font-size: 12px; color: #1a1a1a; margin: 0; padding: 32px; }
        .row { width: 100%; overflow: hidden; }
        .col { float: left; width: 50%; }
        .right { text-align: right; }
        h1 { font-size: 22px; margin: 0 0 4px 0; }
        .muted { color: #666; }
        .org { font-size: 16px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 24px; }
        th { text-align: left; border-bottom: 2px solid #333; padding: 6px 8px; font-size: 11px; text-transform: uppercase; }
        td { padding: 6px 8px; border-bottom: 1px solid #ddd; }
        td.num, th.num { text-align: right; }
        .totals { width: 40%; float: right; margin-top: 16px; }
        .totals td { border: none; padding: 4px 8px; }
        .totals .grand td { border-top: 2px solid #333; font-weight: bold; font-size: 14px; }
        .badge { display: inline-block; padding: 2px 8px; border: 1px solid #999; border-radius: 4px; font-size: 10px; }
        .notes { margin-top: 40px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="row">
        <div class="col">
            <div class="org" th:text="${tenant != null} ? ${tenant.name} : 'Your Company'">Company</div>
            <div class="muted" th:if="${tenant != null and tenant.taxId != null}" th:text="'Tax ID: ' + ${tenant.taxId}">Tax ID</div>
        </div>
        <div class="col right">
            <h1>INVOICE</h1>
            <div th:text="${inv.invoiceNumber}">INV-0001</div>
            <div class="badge" th:text="${inv.status}">DRAFT</div>
        </div>
    </div>

    <div class="row" style="margin-top: 28px;">
        <div class="col">
            <div class="muted">Bill to</div>
            <div style="font-weight: bold;" th:text="${client != null} ? ${client.name} : ''">Client</div>
            <div th:if="${client != null and client.email != null}" th:text="${client.email}">email</div>
            <div th:if="${client != null and client.phone != null}" th:text="${client.phone}">phone</div>
        </div>
        <div class="col right">
            <div><span class="muted">Issue date: </span><span th:text="${inv.issueDate}">-</span></div>
            <div><span class="muted">Due date: </span><span th:text="${inv.dueDate}">-</span></div>
            <div><span class="muted">Currency: </span><span th:text="${inv.currency}">MYR</span></div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Description</th>
                <th class="num">Qty</th>
                <th class="num">Unit price</th>
                <th class="num">Tax %</th>
                <th class="num">Line total</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="li : ${lineItems}">
                <td th:text="${li.description}">Item</td>
                <td class="num" th:text="${li.quantity}">1</td>
                <td class="num" th:text="${#numbers.formatDecimal(li.unitPrice,1,'COMMA',2,'POINT')}">0.00</td>
                <td class="num" th:text="${#numbers.formatDecimal(li.taxRate,1,'COMMA',2,'POINT')}">0.00</td>
                <td class="num" th:text="${#numbers.formatDecimal(li.lineTotal,1,'COMMA',2,'POINT')}">0.00</td>
            </tr>
        </tbody>
    </table>

    <table class="totals">
        <tr>
            <td>Subtotal</td>
            <td class="num" th:text="${inv.currency} + ' ' + ${#numbers.formatDecimal(inv.subtotal,1,'COMMA',2,'POINT')}">0.00</td>
        </tr>
        <tr>
            <td>Tax</td>
            <td class="num" th:text="${inv.currency} + ' ' + ${#numbers.formatDecimal(inv.taxAmount,1,'COMMA',2,'POINT')}">0.00</td>
        </tr>
        <tr th:if="${inv.discountAmount != null and inv.discountAmount.signum() > 0}">
            <td>Discount</td>
            <td class="num" th:text="'-' + ${inv.currency} + ' ' + ${#numbers.formatDecimal(inv.discountAmount,1,'COMMA',2,'POINT')}">0.00</td>
        </tr>
        <tr class="grand">
            <td>Total</td>
            <td class="num" th:text="${inv.currency} + ' ' + ${#numbers.formatDecimal(inv.totalAmount,1,'COMMA',2,'POINT')}">0.00</td>
        </tr>
        <tr>
            <td>Amount paid</td>
            <td class="num" th:text="${inv.currency} + ' ' + ${#numbers.formatDecimal(inv.amountPaid,1,'COMMA',2,'POINT')}">0.00</td>
        </tr>
        <tr class="grand">
            <td>Amount due</td>
            <td class="num" th:text="${inv.currency} + ' ' + ${#numbers.formatDecimal(inv.amountDue,1,'COMMA',2,'POINT')}">0.00</td>
        </tr>
    </table>

    <div style="clear: both;"></div>

    <div class="notes" th:if="${inv.notes != null and !inv.notes.isEmpty()}">
        <div class="muted">Notes</div>
        <div th:text="${inv.notes}">notes</div>
    </div>
</body>
</html>
