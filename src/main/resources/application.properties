spring.application.name=invoice-hub-backend
# DB credentials resolve from .env (via spring-dotenv) when running locally, or
# from real env vars when running under Docker. The values after ':' are dev
# fallbacks used only if neither supplies them.
spring.datasource.url=jdbc:postgresql://localhost:5432/invoice-hub
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

server.servlet.session.cookie.same-site=strict

spring.docker.compose.enabled=false

spring.security.user.name=adam
spring.security.user.password=1234

server.servlet.context-path=/api
server.port=8100

# CORS: comma-separated list of allowed browser origins (Vite dev server).
app.cors.allowed-origins=http://localhost:5173

# Public URL of the frontend. Used to build links emailed to users (e.g. invite accept).
# Override via APP_BASE_URL in production (e.g. https://app.invoicehub.com).
app.base-url=${APP_BASE_URL:http://localhost:5173}

# JWT — STABLE signing key (do NOT regenerate per restart, or all tokens break).
# Reads the JWT_SECRET env var in production; falls back to a dev key locally.
jwt.secret=${JWT_SECRET:2bda0e8dfe4c0b5b0a4e11ece648c0370d5921368eae7f80f0a7a1eb71441b8b}
jwt.access-token-minutes=30

# Refresh-cookie "Secure" flag. MUST be false for local http://localhost dev
# (a Secure cookie is dropped over plain http). Set true in production (HTTPS).
app.cookie.secure=false

spring.mail.host=localhost
# Mailpit SMTP — host port 1026 (mapped to the container's 1025 in docker-compose.yml,
# offset to avoid clashing with the other mailpit on 1025). Web UI: http://localhost:8026
spring.mail.port=1026
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false