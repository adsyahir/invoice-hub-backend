spring:
  # Load .env natively (Spring Boot 4) so ${VAR} placeholders resolve from it on a
  # local run — no third-party lib. `optional:` = don't fail if the file is absent
  # (e.g. in Docker, where compose passes the vars as real env vars instead).
  # `[.properties]` tells Boot to parse the extensionless .env as key=value pairs.
  # NOTE: the file is resolved relative to the process WORKING DIRECTORY, which
  # must be the invoice-hub-backend module root (where .env lives).
  config:
    import: optional:file:.env[.properties]

  application:
    name: invoice-hub-backend

  # DB credentials resolve from .env (via spring-dotenv) when running locally, or
  # from real env vars when running under Docker. The values after ':' are dev
  # fallbacks used only if neither supplies them.
  datasource:
    url: jdbc:postgresql://localhost:5432/invoice-hub
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  # Spring Boot's own docker-compose support is disabled; we manage compose manually.
  docker:
    compose:
      enabled: false

  security:
    user:
      name: adam
      password: 1234

  mail:
    host: localhost
    # Mailpit SMTP — host port 1026 (mapped to the container's 1025 in
    # docker-compose.yml, offset to avoid clashing with the other mailpit on
    # 1025). Web UI: http://localhost:8026
    port: 1026
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  # Full-text search. Local run reads ELASTICSEARCH_HOST/PORT from .env; in Docker
  # the SPRING_ELASTICSEARCH_URIS env var overrides this with the service name.
  elasticsearch:
    uris: http://${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # JsonSerializer, not the default StringSerializer — the values are event records.
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all              # don't consider it sent until replicas have it
      retries: 3
      properties:
        enable.idempotence: true   # no duplicate records on producer retry
    consumer:
      group-id: invoicehub
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer wraps the JSON one: without it, a single malformed record
      # throws BEFORE the listener runs, so the offset can never advance and the consumer
      # retries that same poison message forever.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # Whitelist only our event package. JsonDeserializer will not instantiate arbitrary
        # classes named in a header (deserialization gadget attacks) — never set this to "*".
        spring.json.trusted.packages: com.adsyahir.invoice_hub_backend.event
    listener:
      ack-mode: record        # commit offset per record, after the listener returns

  # Spring AI — OpenRouter (OpenAI-compatible gateway). Spring AI 2.0's OpenAI
  # integration uses the official openai-java SDK, which appends only
  # "/chat/completions" — so base-url MUST include "/v1". Final endpoint:
  # https://openrouter.ai/api/v1/chat/completions. Model must support tool-calling;
  # free `:free` models work but can be rate-limited (HTTP 429).
  ai:
    openai:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY}
      chat:
        options:
          model: "${OPENROUTER_MODEL:openai/gpt-oss-20b:free}"
          temperature: 0.3

server:
  port: 8100
  servlet:
    context-path: /api
    session:
      cookie:
        same-site: strict

app:
  # CORS: comma-separated list of allowed browser origins (Vite dev server).
  cors:
    allowed-origins: http://localhost:5173

  # Public URL of the frontend. Used to build links emailed to users (e.g. invite
  # accept). Override via APP_BASE_URL in production (e.g. https://app.invoicehub.com).
  base-url: ${APP_BASE_URL:http://localhost:5173}

  # Refresh-cookie "Secure" flag. MUST be false for local http://localhost dev
  # (a Secure cookie is dropped over plain http). Set true in production (HTTPS).
  cookie:
    secure: false

  # MyInvois (LHDN) integration. The submission is still simulated; flip this to true
  # to make every call fail, so the circuit breaker can be demonstrated end to end.
  myinvois:
    simulate-outage: ${MYINVOIS_SIMULATE_OUTAGE:false}

# JWT — STABLE signing key (do NOT regenerate per restart, or all tokens break).
# Reads the JWT_SECRET env var in production; falls back to a dev key locally.
jwt:
  secret: ${JWT_SECRET:2bda0e8dfe4c0b5b0a4e11ece648c0370d5921368eae7f80f0a7a1eb71441b8b}
  access-token-minutes: 30

# Fault tolerance for the MyInvois (LHDN) call. COUNT_BASED window: once at least
# minimum-number-of-calls have been recorded and the failure rate crosses the threshold,
# the breaker trips OPEN and short-circuits calls for wait-duration-in-open-state. It then
# moves to HALF_OPEN and lets a few probe calls through before closing (auto-transition) —
# so a recovered MyInvois heals the breaker on its own, no restart needed.
resilience4j:
  circuitbreaker:
    instances:
      myinvois:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50          # % of recent calls that must fail to trip OPEN
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # A transient outage is exactly what should trip the breaker.
        record-exceptions:
          - com.adsyahir.invoice_hub_backend.myinvois.MyInvoisUnavailableException
